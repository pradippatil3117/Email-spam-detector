version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: aegis-backend
    ports:
      - "8000:8000"
    volumes:
      # Persist the SQLite database file
      - aegis-data:/app
    healthcheck:
      # Native python script healthcheck (avoids installing curl in slim image)
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: always

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: aegis-frontend
    ports:
      - "3000:3000"
    environment:
      - BACKEND_URL=http://backend:8000
      - SPAWN_BACKEND=false
      - NODE_ENV=production
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      # Native Node.js healthcheck (avoids installing curl in slim image)
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: always

volumes:
  aegis-data:
